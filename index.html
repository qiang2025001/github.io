<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝石消除大作战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 32px;
            color: #667eea;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        .game-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 10px 20px;
            border-radius: 15px;
            text-align: center;
            min-width: 80px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            margin-bottom: 20px;
            background: #e0e0e0;
            padding: 10px;
            border-radius: 15px;
            position: relative;
        }

        .cell {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s ease;
            position: relative;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .cell:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .cell.selected {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
            z-index: 20;
            animation: pulse 1s infinite;
        }

        .cell.matched {
            animation: matchAnimation 0.5s ease forwards;
        }

        .cell.falling {
            animation: fallAnimation 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.15); }
            50% { transform: scale(1.25); }
        }

        @keyframes matchAnimation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes fallAnimation {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .gem-red { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .gem-blue { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
        .gem-green { background: linear-gradient(135deg, #95e1d3, #7bc8a4); }
        .gem-yellow { background: linear-gradient(135deg, #ffd93d, #f6ad55); }
        .gem-purple { background: linear-gradient(135deg, #a29bfe, #b39ddb); }
        .gem-orange { background: linear-gradient(135deg, #fd79a8, #e84393); }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .combo-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            animation: comboFloat 1s ease forwards;
            z-index: 100;
        }

        @keyframes comboFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .game-over h2 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 48px;
            color: #764ba2;
            font-weight: bold;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            transition: width 0.3s ease;
            width: 100%;
        }

        .hint-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">💎 宝石消除大作战</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="timeBar"></div>
            </div>
            <div class="game-stats">
                <div class="stat-box">
                    <div class="stat-label">得分</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">时间</div>
                    <div class="stat-value" id="time">60</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">连击</div>
                    <div class="stat-value" id="combo">0</div>
                </div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
            <button class="btn btn-secondary" onclick="resetGame()">重置</button>
        </div>

        <div class="hint-text">点击两个相邻的宝石交换位置，三个或以上相同宝石连成一线即可消除</div>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>游戏结束！</h2>
            <div class="final-score" id="finalScore">0</div>
            <p style="font-size: 18px; color: #666; margin-bottom: 20px;">太棒了！</p>
            <button class="btn btn-primary" onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_SIZE = 8;
        const GEM_TYPES = ['💎', '🔷', '🔶', '💚', '💜', '❤️'];
        const GEM_CLASSES = ['gem-red', 'gem-blue', 'gem-yellow', 'gem-green', 'gem-purple', 'gem-orange'];
        const GAME_DURATION = 60;

        // 游戏状态
        let board = [];
        let score = 0;
        let timeLeft = GAME_DURATION;
        let combo = 0;
        let selectedCell = null;
        let isProcessing = false;
        let gameTimer = null;
        let isGameActive = false;

        // 初始化游戏板
        function initBoard() {
            board = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                board[row] = [];
                for (let col = 0; col < BOARD_SIZE; col++) {
                    let gem;
                    do {
                        gem = Math.floor(Math.random() * GEM_TYPES.length);
                    } while (
                        (col >= 2 && board[row][col-1] === gem && board[row][col-2] === gem) ||
                        (row >= 2 && board[row-1][col] === gem && board[row-2][col] === gem)
                    );
                    board[row][col] = gem;
                }
            }
        }

        // 渲染游戏板
        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${GEM_CLASSES[board[row][col]]}`;
                    cell.textContent = GEM_TYPES[board[row][col]];
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.onclick = () => handleCellClick(row, col);
                    gameBoard.appendChild(cell);
                }
            }
        }

        // 处理点击事件
        function handleCellClick(row, col) {
            if (!isGameActive || isProcessing) return;

            const clickedCell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);

            if (!selectedCell) {
                selectedCell = { row, col, element: clickedCell };
                clickedCell.classList.add('selected');
            } else {
                const prevRow = selectedCell.row;
                const prevCol = selectedCell.col;
                const prevElement = selectedCell.element;

                // 检查是否相邻
                if (Math.abs(row - prevRow) + Math.abs(col - prevCol) === 1) {
                    isProcessing = true;
                    prevElement.classList.remove('selected');
                    
                    // 交换动画
                    swapGems(prevRow, prevCol, row, col);
                    
                    setTimeout(() => {
                        if (checkMatches()) {
                            combo = 0;
                            processMatches();
                        } else {
                            // 无效移动，换回来
                            swapGems(prevRow, prevCol, row, col);
                            setTimeout(() => {
                                isProcessing = false;
                            }, 300);
                        }
                    }, 300);
                } else {
                    prevElement.classList.remove('selected');
                    selectedCell = { row, col, element: clickedCell };
                    clickedCell.classList.add('selected');
                }
            }
        }

        // 交换宝石
        function swapGems(row1, col1, row2, col2) {
            const temp = board[row1][col1];
            board[row1][col1] = board[row2][col2];
            board[row2][col2] = temp;
            renderBoard();
        }

        // 检查匹配
        function checkMatches() {
            const matches = [];
            
            // 检查横向
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE - 2; col++) {
                    if (board[row][col] === board[row][col+1] && board[row][col] === board[row][col+2]) {
                        let matchLength = 3;
                        while (col + matchLength < BOARD_SIZE && board[row][col] === board[row][col+matchLength]) {
                            matchLength++;
                        }
                        for (let i = 0; i < matchLength; i++) {
                            matches.push({ row, col: col + i });
                        }
                    }
                }
            }

            // 检查纵向
            for (let col = 0; col < BOARD_SIZE; col++) {
                for (let row = 0; row < BOARD_SIZE - 2; row++) {
                    if (board[row][col] === board[row+1][col] && board[row][col] === board[row+2][col]) {
                        let matchLength = 3;
                        while (row + matchLength < BOARD_SIZE && board[row][col] === board[row+matchLength][col]) {
                            matchLength++;
                        }
                        for (let i = 0; i < matchLength; i++) {
                            matches.push({ row: row + i, col });
                        }
                    }
                }
            }

            // 去重
            const uniqueMatches = [];
            const seen = new Set();
            for (const match of matches) {
                const key = `${match.row},${match.col}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueMatches.push(match);
                }
            }

            return uniqueMatches;
        }

        // 处理匹配
        function processMatches() {
            const matches = checkMatches();
            if (matches.length === 0) {
                isProcessing = false;
                combo = 0;
                updateStats();
                return;
            }

            combo++;
            const points = matches.length * 10 * combo;
            score += points;
            updateStats();

            // 显示连击文字
            if (combo > 1) {
                showComboText(combo);
            }

            // 标记匹配的宝石
            matches.forEach(match => {
                const cell = document.querySelector(`[data-row="${match.row}"][data-col="${match.col}"]`);
                if (cell) cell.classList.add('matched');
            });

            setTimeout(() => {
                // 移除匹配的宝石
                matches.forEach(match => {
                    board[match.row][match.col] = -1;
                });

                // 下落填充
                fillBoard();
                renderBoard();

                // 继续检查新的匹配
                setTimeout(() => {
                    processMatches();
                }, 300);
            }, 500);
        }

        // 填充空白
        function fillBoard() {
            for (let col = 0; col < BOARD_SIZE; col++) {
                let emptySlots = 0;
                for (let row = BOARD_SIZE - 1; row >= 0; row--) {
                    if (board[row][col] === -1) {
                        emptySlots++;
                    } else if (emptySlots > 0) {
                        board[row + emptySlots][col] = board[row][col];
                        board[row][col] = -1;
                    }
                }

                // 生成新宝石
                for (let row = 0; row < emptySlots; row++) {
                    board[row][col] = Math.floor(Math.random() * GEM_TYPES.length);
                }
            }
        }

        // 显示连击文字
        function showComboText(comboCount) {
            const gameBoard = document.getElementById('gameBoard');
            const comboText = document.createElement('div');
            comboText.className = 'combo-text';
            comboText.textContent = `${comboCount} 连击!`;
            comboText.style.left = '50%';
            comboText.style.top = '50%';
            comboText.style.transform = 'translate(-50%, -50%)';
            gameBoard.appendChild(comboText);

            setTimeout(() => {
                comboText.remove();
            }, 1000);
        }

        // 更新统计
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('combo').textContent = combo;
        }

        // 更新时间
        function updateTimer() {
            timeLeft--;
            document.getElementById('time').textContent = timeLeft;
            
            const progressBar = document.getElementById('timeBar');
            const percentage = (timeLeft / GAME_DURATION) * 100;
            progressBar.style.width = percentage + '%';

            if (timeLeft <= 0) {
                endGame();
            }
        }

        // 开始游戏
        function startGame() {
            // 重置状态
            score = 0;
            timeLeft = GAME_DURATION;
            combo = 0;
            selectedCell = null;
            isProcessing = false;
            isGameActive = true;

            // 隐藏游戏结束界面
            document.getElementById('gameOver').style.display = 'none';

            // 初始化
            initBoard();
            renderBoard();
            updateStats();
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('timeBar').style.width = '100%';

            // 清除旧定时器
            if (gameTimer) clearInterval(gameTimer);

            // 启动定时器
            gameTimer = setInterval(updateTimer, 1000);
        }

        // 结束游戏
        function endGame() {
            isGameActive = false;
            clearInterval(gameTimer);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        // 重置游戏
        function resetGame() {
            isGameActive = false;
            clearInterval(gameTimer);
            startGame();
        }

        // 页面加载完成后初始化
        window.onload = () => {
            initBoard();
            renderBoard();
        };
    </script>
</body>
</html>
